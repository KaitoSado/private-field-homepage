  <!-- Swords (front layer, crossing over shield) -->
  <!-- Sword 1: top-left to bottom-right -->
  <line x1="10" y1="6" x2="118" y2="122" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
